name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      DATABASE_PATH: .runtime/ci.sqlite
      LOG_LEVEL: warn
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      - run: npm test
      - run: npm run build
